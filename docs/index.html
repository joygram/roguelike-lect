<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Unity 2D 플랫포머 개발 가이드</title>
  <meta name="description" content="로그라이크·플랫포머 프로젝트 문서" />
  <!-- 테마 변경 시: 아래 테마 링크만 바꾸면 됨. 코드 색은 assets/github-pages-code.css가 고정 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="assets/github-pages-code.css" />
  <style>
    .markdown-section { max-width: 900px; }
    .sidebar { width: 280px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    (function () {
      var path = location.pathname || '/';
      var basePath = '/';
      var seg = path.replace(/\/index\.html?$/, '/').split('/').filter(Boolean);
      if (seg.length > 0 && seg[0] !== 'index.html') {
        basePath = '/' + seg[0] + '/';
      }
      window.$docsify = {
        name: '개발 가이드',
        repo: '',
        loadSidebar: true,
        subMaxLevel: 3,
        homepage: 'web-홈.md',
        basePath: basePath,
        search: {
          paths: 'auto',
          placeholder: '검색…',
          noData: '결과 없음',
        },
      };
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
